<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIMBLE Tracker Builder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #0f141a; color: #e2e8f0; }
        .container { background: #1b222c; padding: 30px; border-radius: 8px; border: 1px solid #3a4a5e; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; margin-top: 0; text-align: center; }
        p { color: #94a3b8; text-align: center; line-height: 1.5; margin-bottom: 25px; }
        select, button { padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; border-radius: 4px; }
        select { background: #070a0e; color: #e2e8f0; border: 1px solid #3a4a5e; margin-bottom: 20px; cursor: pointer; }
        select:focus { outline: none; border-color: #38bdf8; }
        button { background: #38bdf8; color: #000; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0284c7; color: #fff; }
        button:disabled { background: #3a4a5e; color: #94a3b8; cursor: not-allowed; }
        .status { margin-top: 20px; font-size: 14px; text-align: center; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NIMBLE Builder</h1>
        <p>Select a class below to generate and download its self-contained digital character tracker.</p>
        
        <select id="classSelect">
            <option value="berserker">Berserker</option>
            <option value="cheat">Cheat</option>
            <option value="commander">Commander</option>
            <option value="hunter">Hunter</option>
            <option value="mage">Mage</option>
            <option value="oathsworn">Oathsworn</option>
            <option value="shadowmancer">Shadowmancer</option>
            <option value="shepherd">Shepherd</option>
            <option value="songweaver">Songweaver</option>
            <option value="stormshifter">Stormshifter</option>
            <option value="zephyr">Zephyr</option>
        </select>

        <button id="buildBtn" onclick="buildTracker()">Download Tracker</button>
        <div id="status" class="status">Ready.</div>
    </div>

    <script>
        const VERSION = '1.3.0';

        async function fetchFile(path) {
            const response = await fetch(`${path}?t=${Date.now()}`);
            if (!response.ok) throw new Error(`Failed to load ${path}`);
            return await response.text();
        }

        async function buildTracker() {
            const className = document.getElementById('classSelect').value;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('buildBtn');
            
            try {
                btn.disabled = true;
                statusEl.innerText = `Fetching files for ${className}...`;
                statusEl.style.color = '#94a3b8';

                // 1. Fetch all necessary files in parallel
                const [
                    template,
                    itemsJson,
                    skillsJson,
                    conditionsJson,
                    ancestriesJson,
                    backgroundsJson,
                    spellsJson,
                    classData,
                    engine
                ] = await Promise.all([
                    fetchFile('src/base_template.html'),
                    fetchFile('src/data/json/items.json'),
                    fetchFile('src/data/json/skills.json'),
                    fetchFile('src/data/json/conditions.json'),
                    fetchFile('src/data/json/ancestries.json'),
                    fetchFile('src/data/json/backgrounds.json'),
                    fetchFile('src/data/json/spells.json'),
                    fetchFile(`src/data/class_${className}.js`),
                    fetchFile('src/engine.js')
                ]);

                statusEl.innerText = 'Stitching files together...';

                // 2. Combine JS content
                const ancestries = JSON.parse(ancestriesJson);
                const backgrounds = JSON.parse(backgroundsJson);
                const spells = JSON.parse(spellsJson);

                let jsContent = `// --- Generated Core Data ---\n`;
                jsContent += `const ITEM_TEMPLATES = ${itemsJson};\n`;
                jsContent += `const SKILL_LIST = ${skillsJson};\n`;
                jsContent += `const CONDITIONS_LIST = ${conditionsJson};\n`;
                jsContent += `const ANCESTRIES = ${JSON.stringify(ancestries.categories)};\n`;
                jsContent += `const ANCESTRY_FEATURES = ${JSON.stringify(ancestries.features)};\n`;
                jsContent += `const BACKGROUNDS = ${JSON.stringify(backgrounds.categories)};\n`;
                jsContent += `const BACKGROUND_FEATURES = ${JSON.stringify(backgrounds.features)};\n`;
                jsContent += `const UTILITY_SPELLS = ${JSON.stringify(spells.utility)};\n`;
                jsContent += `const SPELL_REGISTRY = ${JSON.stringify(spells.registry)};\n\n`;

                jsContent += `// --- Source: src/data/class_${className}.js ---\n${classData}\n\n`;
                jsContent += `// --- Source: src/engine.js ---\n${engine}\n\n`;

                const fullScript = `<script>\n${jsContent}<\/script>`;

                // 3. Inject into template
                const finalHtml = template.replace('<!-- INJECT_SCRIPTS -->', fullScript);

                // 4. Create Blob and Download
                statusEl.innerText = 'Generating download...';
                const blob = new Blob([finalHtml], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `nimble_tracker_${className}_v${VERSION}.html`;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusEl.innerText = `Success! ${className} tracker downloaded.`;
                statusEl.style.color = '#22c55e'; // green

            } catch (error) {
                console.error(error);
                statusEl.innerText = `Error: ${error.message}`;
                statusEl.style.color = '#ef4444'; // red
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
