<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIMBLE Tracker Builder</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #0f141a;
            color: #e2e8f0;
        }

        .container {
            background: #1b222c;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #3a4a5e;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #38bdf8;
            margin-top: 0;
            text-align: center;
        }

        p {
            color: #94a3b8;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        select,
        button {
            padding: 12px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
        }

        select {
            background: #2d3748;
            color: white;
            border: 1px solid #4a5568;
            margin-bottom: 15px;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .version {
            text-align: center;
            font-size: 12px;
            color: #475569;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>NIMBLE Builder</h1>
        <p>Select your character class to generate a self-contained character tracker file.</p>

        <select id="classSelect">
            <option value="berserker">Berserker</option>
            <option value="cheat">Cheat</option>
            <option value="commander">Commander</option>
            <option value="hunter">Hunter</option>
            <option value="mage">Mage</option>
            <option value="oathsworn">Oathsworn</option>
            <option value="shadowmancer">Shadowmancer</option>
            <option value="shepherd">Shepherd</option>
            <option value="songweaver">Songweaver</option>
            <option value="stormshifter">Stormshifter</option>
            <option value="zephyr">Zephyr</option>
        </select>

        <button id="buildBtn" onclick="buildTracker()">Generate Tracker</button>
        <div id="status"></div>
    </div>

    <div class="version" onclick="handleVersionClick()">NIMBLE Character Tracker v3.0.0</div>

    <script>
        /**
         * Master Build Logic for NIMBLE Trackers.
         * Concatenates raw data, engine modules, and class-specific code into a single HTML blob.
         */
        const VERSION = '3.0.0';
        let clickCount = 0;

        function handleVersionClick() {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                buildAll();
            }
        }

        /**
         * Helper to fetch a local file as text.
         * Bypasses browser cache using a timestamp.
         * @param {string} path - Relative path to the file.
         * @returns {Promise<string>} File content.
         */
        async function fetchFile(path) {
            const r = await fetch(`${path}?t=${Date.now()}`);
            if (!r.ok) throw new Error(`Could not load ${path}`);
            return await r.text();
        }

        /**
         * Fetches all core files (shared by all classes).
         */
        async function fetchCore() {
            const engineModules = [
                'solid.js', 'rolls.js', 'features.js', 'ui.js', 'core.js', 
                'eventBus.js', 'state.js', 'bridge.js', 'components.js', 'app.js'
            ];

            const [
                template, itemsJson, skillsJson, conditionsJson,
                ancestriesJson, backgroundsJson, spellsJson,
                ...engineParts
            ] = await Promise.all([
                fetchFile('src/base_template.html'),
                fetchFile('src/data/json/items.json'),
                fetchFile('src/data/json/skills.json'),
                fetchFile('src/data/json/conditions.json'),
                fetchFile('src/data/json/ancestries.json'),
                fetchFile('src/data/json/backgrounds.json'),
                fetchFile('src/data/json/spells.json'),
                ...engineModules.map(m => fetchFile(`src/engine/${m}`))
            ]);

            return {
                template, itemsJson, skillsJson, conditionsJson,
                ancestriesJson, backgroundsJson, spellsJson,
                engineParts
            };
        }

        /**
         * Builds a single tracker from fetched core data and a specific class.
         */
        function assembleTracker(core, className, classData) {
            const ancestries = JSON.parse(core.ancestriesJson);
            const backgrounds = JSON.parse(core.backgroundsJson);
            const spells = JSON.parse(core.spellsJson);

            let jsContent = `// --- Generated Core Data ---\n`;
            jsContent += `const ITEM_TEMPLATES = ${core.itemsJson};\n`;
            jsContent += `const SKILL_LIST = ${core.skillsJson};\n`;
            jsContent += `const CONDITIONS_LIST = ${core.conditionsJson};\n`;
            jsContent += `const ANCESTRIES = ${JSON.stringify(ancestries.categories)};\n`;
            jsContent += `const ANCESTRY_FEATURES = ${JSON.stringify(ancestries.features)};\n`;
            jsContent += `const BACKGROUNDS = ${JSON.stringify(backgrounds.categories)};\n`;
            jsContent += `const BACKGROUND_FEATURES = ${JSON.stringify(backgrounds.features)};\n`;
            jsContent += `const UTILITY_SPELLS = ${JSON.stringify(spells.utility)};\n`;
            jsContent += `const SPELL_REGISTRY = ${JSON.stringify(spells.registry)};\n\n`;

            // Map engine parts (ordered by fetchCore)
            const [solid, rolls, features, ui, corePart, eventBus, state, bridge, components, app] = core.engineParts;

            jsContent += `// --- SolidJS Runtime ---\n${solid}\n\n`;
            jsContent += `// --- Engine Helpers & Base ---\n${rolls}\n${features}\n${ui}\n${corePart}\n${eventBus}\n\n`;
            jsContent += `// --- Source: src/data/class_${className}.js ---\n${classData}\n\n`;
            jsContent += `// --- Engine Logic ---\n${state}\n${bridge}\n${components}\n${app}\n\n`;

            const fullScript = `<script>\n${jsContent}<\/script>`;
            const parts = core.template.split('<!-- INJECT_SCRIPTS -->');
            if (parts.length < 2) throw new Error("Template is missing injection placeholder.");
            return parts[0] + fullScript + parts[1];
        }

        /**
         * Main build sequence for a single tracker.
         */
        async function buildTracker() {
            const className = document.getElementById('classSelect').value;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('buildBtn');

            try {
                btn.disabled = true;
                statusEl.innerText = `Generating ${className}...`;
                statusEl.style.color = '#94a3b8';

                const core = await fetchCore();
                const classData = await fetchFile(`src/data/class_${className}.js`);
                const finalHtml = assembleTracker(core, className, classData);

                downloadBlob(finalHtml, `nimble_tracker_${className}_v${VERSION}.html`);

                statusEl.innerText = `Success! ${className} downloaded.`;
                statusEl.style.color = '#22c55e';
            } catch (error) {
                console.error(error);
                statusEl.innerText = `Error: ${error.message}`;
                statusEl.style.color = '#ef4444';
            } finally {
                btn.disabled = false;
            }
        }

        /**
         * Hidden Debug: Builds and downloads ALL trackers.
         */
        async function buildAll() {
            const statusEl = document.getElementById('status');
            const classes = Array.from(document.getElementById('classSelect').options).map(o => o.value);

            try {
                statusEl.innerText = `Starting batch build of ${classes.length} classes...`;
                statusEl.style.color = '#38bdf8';

                const core = await fetchCore();

                for (const className of classes) {
                    statusEl.innerText = `Building ${className}...`;
                    const classData = await fetchFile(`src/data/class_${className}.js`);
                    const finalHtml = assembleTracker(core, className, classData);
                    downloadBlob(finalHtml, `nimble_tracker_${className}_v${VERSION}.html`);
                    // Small delay to prevent browser congestion
                    await new Promise(r => setTimeout(r, 200));
                }

                statusEl.innerText = `Batch complete! ${classes.length} trackers downloaded.`;
                statusEl.style.color = '#22c55e';
            } catch (error) {
                console.error(error);
                statusEl.innerText = `Batch Error: ${error.message}`;
                statusEl.style.color = '#ef4444';
            }
        }

        function downloadBlob(content, filename) {
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
