<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBLE — Character Tracker v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Base Neutral Palette */
    --gold: #c8922a; --gold-light: #e8b84b; --gold-dim: #7a5818;
    --slate-darkest: #070a0e; --slate-dark: #0f141a; --slate-mid: #1b222c;
    --slate-light: #2a3441; --slate-lighter: #3a4a5e;
    --text-main: #e2e8f0; --text-muted: #94a3b8;
    --save-adv: #22c55e;
    --save-dis: #ef4444;

    /* Class Specific Variables (Dynamic) */
    --class-accent: #38bdf8;
    --class-accent-dim: #0284c7;
    --class-body-bg: #070a0e;
    --class-container-bg: #0f141a;
    --class-panel-bg: #1b222c;
    --class-border: var(--slate-lighter);
  }

  /* Hide scrollbars globally but keep functionality */
  * {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
  }
  *::-webkit-scrollbar {
    display: none; /* Chrome, Safari and Opera */
  }

  /* Animations for resource changes */
  @keyframes pulse-green {
    0% { background-color: rgba(34, 197, 94, 0.4); }
    100% { background-color: transparent; }
  }
  @keyframes pulse-red {
    0% { background-color: rgba(239, 68, 68, 0.4); }
    100% { background-color: transparent; }
  }
  .flash-green { animation: pulse-green 1s ease-out; }
  .flash-red { animation: pulse-red 1s ease-out; }

  /* Error state for validation */
  .error-glow {
    border-bottom-color: var(--save-dis) !important;
    box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
    color: var(--save-dis) !important;
  }

  body {
    background-color: var(--class-body-bg); color: var(--text-main);
    font-family: 'Crimson Text', serif; margin: 0; padding: 5px;
    display: flex; justify-content: center; font-size: 14px;
    transition: background-color 0.5s ease;
  }

  .container {
    max-width: 1200px; width: 100%; 
    background: var(--class-container-bg);
    border: 2px solid var(--class-border); 
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    padding: 8px 10px; position: relative; box-sizing: border-box; border-radius: 6px;
    transition: all 0.5s ease;
  }

  .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--class-border); padding-bottom: 4px; margin-bottom: 8px; position: relative; }
  .header::after { content: ''; position: absolute; bottom: -2px; left: 15%; width: 70%; height: 2px; background-color: var(--class-accent); }
  .header-center { text-align: center; flex: 1; padding: 0 15px; }
  h1 { font-family: 'Cinzel Decorative', serif; color: var(--text-main); margin: 0; font-size: 2.0em; letter-spacing: 1px; }
  .subtitle { font-family: 'Cinzel', serif; color: var(--text-muted); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; font-size: 0.75em; }
  
  .header-left-stats, .header-right-stats { display: flex; gap: 12px; min-width: 90px; }
  .header-left-stats { justify-content: flex-start; }
  .header-right-stats { justify-content: flex-end; }
  .header-stat { display: flex; flex-direction: column; align-items: center; }
  .header-stat label { color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 1px; text-transform: uppercase; margin: 0; font-weight: 600; }
  .header-stat-val { font-family: 'Cinzel', serif; font-size: 1.5em; font-weight: bold; margin-top: 0px; color: #fff; line-height: 1.0; }

  h2.section-header { font-family: 'Cinzel Decorative', serif; border-bottom: 1px solid var(--class-border); padding-bottom: 3px; margin: 0 0 8px 0; color: var(--class-accent); font-size: 1.2em; }
  #saveIndicator { position: absolute; top: 8px; right: 12px; font-family: 'Cinzel', serif; font-size: 0.65em; color: var(--slate-lighter); font-weight: bold; text-transform: uppercase; }

  .top-bar { display: grid; grid-template-columns: 2fr 0.6fr 1fr 1fr 1.2fr; gap: 6px; margin-bottom: 8px; align-items: end; }
  .top-bar .panel { padding: 2px 6px; border: none; background: transparent; }
  .top-bar input, .top-bar select { font-size: 0.85em; }

  .layout-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: stretch; margin-bottom: 10px; width: 100%; }
  .layout-1col { width: 100%; margin-bottom: 10px; }
  .dashboard-row { height: 320px; }
  
  .left-col, .right-col { min-width: 0; width: 100%; }

  .panel { background: var(--class-panel-bg); border: 1px solid var(--class-border); padding: 4px 8px; border-radius: 4px; }
  .mechanic-panel { 
    padding: 10px 15px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-sizing: border-box;
    border: none;
    background: transparent;
  }

  .panel-title { font-family: 'Cinzel', serif; font-size: 0.7em; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; display: block; border-bottom: 1px solid var(--class-border); padding-bottom: 1px; }
  
  input[type="text"], input[type="number"], select { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--class-border); font-family: 'Crimson Text', serif; font-size: 1.0em; color: var(--text-main); padding: 1px; text-align: center; text-align-last: center; font-weight: 600; transition: border-color 0.2s, opacity 0.2s; box-sizing: border-box; }
  input:focus, select:focus { outline: none; border-bottom-color: var(--class-accent); background: rgba(255,255,255,0.05); }
  select option { background-color: var(--slate-dark); color: var(--text-main); font-family: 'Crimson Text', serif; text-align: center; }
  select optgroup { background-color: var(--slate-mid); color: var(--gold-light); font-family: 'Cinzel', serif; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; font-size: 0.7em; text-align: center; }

  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  .hero-card { background: var(--class-bg-gradient, var(--class-panel-bg)); border: 1px solid var(--class-accent-dim); border-radius: 6px; padding: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; overflow: hidden; }
  .hero-card label { color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.8em; letter-spacing: 1px; text-transform: uppercase; margin: 0; font-weight: bold; }
  .ability-card { padding: 0; overflow: hidden; }

  .core-stats-row { display: flex; justify-content: space-between; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(56, 189, 248, 0.2); }
  .core-stat { display: flex; flex-direction: column; align-items: center; width: 23%; background: rgba(0,0,0,0.4); padding: 5px 2px; border: 1px solid var(--class-border); border-radius: 4px; transition: all 0.3s ease; position: relative; overflow: hidden; }
  
  .save-indicator { position: absolute; top: 0; left: 0; right: 0; height: 3px; display: none; }
  .core-stat.save-adv .save-indicator { display: block; background-color: var(--save-adv); box-shadow: 0 0 6px var(--save-adv); }
  .core-stat.save-dis .save-indicator { display: block; background-color: var(--save-dis); box-shadow: 0 0 6px var(--save-dis); }

  .core-stat-total { color: #fff; font-size: 2.0em; font-family: 'Cinzel', serif; font-weight: bold; margin: 1px 0; }
  .core-stat-inputs { display: flex; gap: 4px; align-items: center; color: var(--text-muted); }
  .core-stat-inputs input { width: 24px; padding: 1px 0; font-size: 0.8em; text-align: center; background: rgba(255,255,255,0.05); border: none; border-bottom: 2px solid var(--class-border); color: var(--text-main); border-radius: 2px; transition: border-color 0.2s, opacity 0.2s; }
  .core-stat-inputs input:focus { border-bottom-color: var(--class-accent); outline: none; }
  
  .core-stat.key-stat { border: 1px solid var(--class-accent); background: linear-gradient(180deg, rgba(56, 189, 248, 0.15) 0%, rgba(0,0,0,0.4) 100%); box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.1), 0 0 6px rgba(56, 189, 248, 0.3); }
  .core-stat.key-stat label { color: var(--class-accent); text-shadow: 0 0 5px rgba(56, 189, 248, 0.5); font-weight: 700; }

  .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .res-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .res-val { font-family: 'Cinzel', serif; font-size: 1.3em; font-weight: bold; display: flex; align-items: center; gap: 6px; transition: color 0.3s; }
  
  .pips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .pip { appearance: none; width: 14px; height: 14px; border: 2px solid var(--class-border); border-radius: 50%; cursor: pointer; background: rgba(0,0,0,0.6); margin: 0; transition: all 0.2s; }
  .pip.wound:checked { background: var(--save-dis); border-color: var(--save-dis); box-shadow: 0 0 8px var(--save-dis); }
  
  .dark-incrementer { display: flex; align-items: center; background: rgba(0,0,0,0.5); border-radius: 4px; padding: 1px; border: 1px solid var(--slate-light); }
  .dark-incrementer button { background: var(--class-border); color: var(--text-main); border: none; width: 22px; height: 22px; cursor: pointer; font-weight: bold; font-family: monospace; border-radius: 2px; transition: 0.2s; }
  .dark-incrementer button:hover { background: var(--class-accent); color: #000; }
  .dark-incrementer span, .dark-incrementer input[type="number"] { font-family: 'Cinzel', serif; font-weight: bold; min-width: 30px; text-align: center; transition: color 0.3s; border: none; background: transparent; color: #fff; padding: 0; font-size: 1.05em; }
  .dark-incrementer input[type="number"] { -moz-appearance: textfield; width: 35px; }
  .dark-incrementer input[type="number"]::-webkit-inner-spin-button, .dark-incrementer input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  .max-text { font-size: 0.8em; color: var(--text-muted); font-family: 'Cinzel', serif; font-weight: bold; min-width: 20px; margin-top: 2px; }

  .skills-box { background: var(--class-panel-bg); padding: 8px 12px; box-sizing: border-box; height: 150px; margin-top: auto; display: flex; flex-direction: column; }
  .skill-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.7em; color: var(--text-muted); margin-bottom: 2px; border-bottom: 1px solid var(--class-border); padding-bottom: 1px; font-weight: bold; font-family: 'Cinzel', serif; }
  .skills-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 15px; width: 100%; flex: 1; align-content: start; }
  .skill-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; padding: 1px 0; border-bottom: 1px dotted var(--class-border); font-family: 'Cinzel', serif; }
  .skill-row:last-child { border-bottom: none; }
  .skill-name { flex-grow: 1; font-weight: 600; color: var(--text-main); font-size: 0.8em; }
  .skill-stat { font-size: 0.65em; color: var(--text-muted); text-transform: uppercase; margin-left: 3px; }
  .skill-pts { width: 35px; margin: 0 4px; }
  .skill-pts input { width: 100%; font-size: 0.85em; background: var(--slate-dark); border-bottom: 2px solid var(--class-border); padding: 0px; border-radius: 2px; transition: border-color 0.2s; font-family: 'Cinzel', serif; font-weight: bold; }
  .skill-pts input:focus { border-bottom-color: var(--class-accent); }
  .skill-total { width: 28px; text-align: right; font-weight: bold; color: var(--class-accent); font-size: 1.15em; }

  .conditions-box { border: 1px solid var(--class-border); background: var(--class-panel-bg); padding: 10px; border-radius: 6px; }
  .conditions-flex { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .condition-btn { background: var(--slate-dark); border: 1px solid var(--class-border); color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.75em; font-weight: bold; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .condition-btn:hover { background: var(--slate-light); color: var(--text-main); }
  .condition-btn.debuff.active { background: rgba(239, 68, 68, 0.2); border-color: var(--save-dis); color: #fff; box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
  .condition-btn.buff.active { background: rgba(56, 189, 248, 0.2); border-color: var(--class-accent); color: #fff; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }

  .inv-header { display: grid; grid-template-columns: 20px 2fr 1fr 1.6fr 1.6fr 1.8fr 0.8fr 30px 20px; gap: 6px; padding: 0 4px 4px 4px; font-family: 'Cinzel', serif; font-size: 0.8em; color: var(--text-muted); text-transform: uppercase; font-weight: bold; border-bottom: 1px solid var(--class-border); margin-bottom: 6px; }
  .inv-row { display: grid; grid-template-columns: 20px 2fr 1fr 1.6fr 1.6fr 1.8fr 0.8fr 30px 20px; gap: 4px; align-items: center; background: rgba(0,0,0,0.3); border: 1px solid var(--class-border); border-radius: 4px; padding: 4px; margin-bottom: 4px; }
  .inv-input { min-width: 0; background: var(--slate-dark); color: var(--text-main); border: 1px solid var(--class-border); border-radius: 2px; padding: 2px 4px; font-family: 'Crimson Text', serif; font-size: 0.95em; transition: border-color 0.2s; width: 100%; height: 26px; }
  .inv-input:focus { border-color: var(--class-accent); outline: none; }
  
  .add-item-btn { background: var(--slate-light); color: var(--text-main); border: 1px solid var(--class-border); padding: 6px 10px; font-family: 'Cinzel', serif; font-weight: bold; letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: 0.2s; flex: 1; margin-top: 4px; font-size: 0.85em; }
  .add-item-btn:hover { background: var(--class-accent); color: #000; border-color: var(--class-accent); }
  select.add-item-btn { font-family: 'Crimson Text', serif; font-weight: 600; letter-spacing: 0; }

  .feature { background: var(--class-panel-bg); border: 1px solid var(--class-border); border-left: 4px solid var(--class-border); padding: 10px; margin-bottom: 10px; border-radius: 0 4px 4px 0; width: 100%; box-sizing: border-box; }
  .feature.subclass-feature { border-left-color: var(--subclass-accent, var(--class-accent)); background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%), var(--class-panel-bg); }
  .feature.subclass-feature h3 { color: var(--subclass-accent, var(--class-accent)); }
  .feature h3 { font-family: 'Cinzel', serif; font-size: 1.05em; margin: 0 0 4px 0; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
  .feature h3 span.level-tag { font-size: 0.6em; background: var(--slate-light); color: var(--text-main); padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; }
  .feature p { margin: 0; line-height: 1.4; font-size: 0.9em; color: var(--text-muted); }
  .feature ul { margin: 8px 0 0 0; padding-left: 20px; list-style-type: circle; color: var(--text-muted); }
  .feature li { margin-bottom: 4px; font-size: 0.9em; line-height: 1.4; }

  .spell-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .spell-card { background: var(--class-panel-bg); border: 1px solid var(--class-border); padding: 10px; display: flex; flex-direction: column; gap: 4px; position: relative; border-left: 4px solid var(--class-accent); border-radius: 0 4px 4px 0; transition: border-color 0.3s; width: 100%; box-sizing: border-box; }
  .spell-card.subclass-spell { border-left-color: var(--subclass-accent, var(--class-accent)); background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card.subclass-spell h4 { color: var(--subclass-accent, var(--class-accent)); }

  /* Spell School Colors */
  .spell-card.fire { border-left-color: #f97316; background: linear-gradient(90deg, rgba(249, 115, 22, 0.08) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card.ice { border-left-color: #06b6d4; background: linear-gradient(90deg, rgba(6, 182, 212, 0.08) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card.lightning { border-left-color: #eab308; background: linear-gradient(90deg, rgba(234, 179, 8, 0.08) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card.wind { border-left-color: #14b8a6; background: linear-gradient(90deg, rgba(20, 184, 166, 0.08) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card.radiant { border-left-color: #38bdf8; background: linear-gradient(90deg, rgba(56, 189, 248, 0.08) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card.necrotic { border-left-color: #a855f7; background: linear-gradient(90deg, rgba(168, 85, 247, 0.08) 0%, transparent 100%), var(--class-panel-bg); }
  .spell-card h4 { margin: 0; font-family: 'Cinzel', serif; font-size: 1.0em; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--class-border); padding-bottom: 4px; color: var(--text-main); }
  .spell-card h4 span.tier-tag { font-family: 'Crimson Text', serif; font-size: 0.7em; font-weight: normal; color: var(--text-muted); text-transform: uppercase; display: flex; align-items: center; }
  
  .stat-hl { color: var(--gold-light); font-weight: bold; background: rgba(232, 184, 75, 0.1); border-radius: 3px; }
  .dice-hl { color: #fff; font-weight: bold; }
  
  .spell-card select { font-family: 'Crimson Text', serif; font-weight: bold; border-bottom: 2px solid var(--class-border); color: var(--text-main); font-size: 1.0em; background: rgba(255,255,255,0.05); padding: 2px; max-width: 70%; border-radius: 2px; transition: border-color 0.2s; }
  .spell-card select:focus { border-bottom-color: var(--class-accent); }
  .spell-desc { font-size: 0.9em; color: var(--text-muted); line-height: 1.3; }

  #dynamicResourcesContainer { overflow-y: auto; flex: 1; margin-top: 5px; }

  @media (max-width: 850px) {
    .layout-2col { grid-template-columns: 1fr; }
    .top-bar { grid-template-columns: 1fr 1fr; }
    .header { flex-direction: column; gap: 10px; }
    .header-left-stats, .header-right-stats { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="saveIndicator">Auto-saved</div>
  
  <div class="header">
    <div class="header-left-stats" id="headerLeftStats"></div>
    <div class="header-center">
        <h1 id="classNameDisplay">Class Name</h1>
        <div class="subtitle" id="classSubtitleDisplay">Subtitle</div>
        <div style="margin-top: 10px; display: flex; justify-content: center; gap: 10px;">
            <button onclick="exportCharacter()" class="add-item-btn" style="margin:0; padding: 4px 10px; font-size: 0.7em; background: rgba(255,255,255,0.05);">Export Data</button>
            <button onclick="document.getElementById('importFile').click()" class="add-item-btn" style="margin:0; padding: 4px 10px; font-size: 0.7em; background: rgba(255,255,255,0.05);">Import Data</button>
            <input type="file" id="importFile" style="display:none" onchange="importCharacter(this)">
        </div>
    </div>
    <div class="header-right-stats" id="headerRightStats"></div>
  </div>

  <div class="top-bar">
    <div class="panel"><label class="panel-title">Hero Name</label><input type="text" id="charName" placeholder="Name"></div>
    <div class="panel"><label class="panel-title">Lvl (1-20)</label><input type="number" id="level" min="1" max="20" value="1"></div>
    <div class="panel">
      <label class="panel-title">Ancestry</label>
      <select id="ancestry"></select>
    </div>
    <div class="panel">
      <label class="panel-title">Background</label>
      <select id="background"></select>
    </div>
    <div class="panel">
      <label class="panel-title">Subclass</label>
      <select id="subclass"></select>
    </div>
  </div>

  <div class="layout-2col">
    <div class="left-col">
      <div class="hero-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
           <span style="font-family: 'Cinzel', serif; font-size: 0.9em; font-weight: bold; color: var(--text-main); letter-spacing: 1px;">ATTRIBUTES</span>
           <span style="font-family: 'Cinzel', serif; font-size: 0.85em; font-weight: bold;" id="unspentStats">UNSPENT: MAXED OUT</span>
        </div>
        
        <div class="core-stats-row">
          <div class="core-stat" id="statCard_str">
            <div class="save-indicator"></div>
            <label>STR</label>
            <div class="core-stat-total" id="displayStr">0</div>
            <div class="core-stat-inputs">
               <input type="number" id="baseStr" title="Base STR" value="0"><span>+</span><input type="number" id="addStr" title="Added STR Pts" value="0" min="0">
            </div>
          </div>
          <div class="core-stat" id="statCard_dex">
            <div class="save-indicator"></div>
            <label>DEX</label>
            <div class="core-stat-total" id="displayDex">0</div>
            <div class="core-stat-inputs">
               <input type="number" id="baseDex" title="Base DEX" value="0"><span>+</span><input type="number" id="addDex" title="Added DEX Pts" value="0" min="0">
            </div>
          </div>
          <div class="core-stat" id="statCard_int">
            <div class="save-indicator"></div>
            <label>INT</label>
            <div class="core-stat-total" id="displayInt">0</div>
            <div class="core-stat-inputs">
               <input type="number" id="baseInt" title="Base INT" value="0"><span>+</span><input type="number" id="addInt" title="Added INT Pts" value="0" min="0">
            </div>
          </div>
          <div class="core-stat" id="statCard_wil">
            <div class="save-indicator"></div>
            <label>WIL</label>
            <div class="core-stat-total" id="displayWil">0</div>
            <div class="core-stat-inputs">
               <input type="number" id="baseWil" title="Base WIL" value="0"><span>+</span><input type="number" id="addWil" title="Added WIL Pts" value="0" min="0">
            </div>
          </div>
        </div>
        
        <div class="res-row" style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 6px; padding: 10px 12px; margin-bottom: 15px;">
          <label style="color: var(--save-dis); font-size: 1.1em; letter-spacing: 2px; text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); margin: 0;">Wounds</label>
          <div class="pips" id="woundsContainer"></div>
        </div>
        
        <div class="res-row" style="align-items: stretch; margin-bottom: 12px;">
          <div style="display: flex; flex: 1; justify-content: space-between; align-items: center; padding-right: 15px; border-right: 1px dashed rgba(255,255,255,0.15);">
            <label style="color: var(--class-accent);">Hit Points</label>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="res-val dark-incrementer">
                <button onclick="adjHP(-1)">-</button>
                <input type="number" id="displayCurrentHP" min="0" onchange="adjHP(parseInt(this.value), true)">
                <button onclick="adjHP(1)">+</button>
              </div>
              <div class="max-text">/ <span id="displayMaxHP" style="color:var(--text-main);">0</span></div>
            </div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; padding-left: 15px; gap: 8px;">
            <label style="color: var(--text-muted); font-size: 0.8em; margin:0;">Temp HP</label>
            <div class="dark-incrementer" style="padding: 1px; background: rgba(0,0,0,0.3);">
              <button onclick="adjTempHP(-1)" style="width: 20px; height: 20px; line-height: 10px;">-</button>
              <input type="number" id="displayTempHP" min="0" onchange="adjTempHP(parseInt(this.value), true)" style="width: 35px; font-size: 0.9em; color: var(--class-accent); background: rgba(255,255,255,0.03); border-radius: 2px;">
              <button onclick="adjTempHP(1)" style="width: 20px; height: 20px; line-height: 10px;">+</button>
            </div>
          </div>
        </div>

        <div class="res-row">
          <label id="hitDiceLabel">Hit Dice</label>
          <div style="display: flex; align-items: center; gap: 8px;">
            <div class="res-val dark-incrementer">
              <button onclick="adjHD(-1)">-</button>
              <input type="number" id="displayHD" min="0" onchange="adjHD(parseInt(this.value), true)">
              <button onclick="adjHD(1)">+</button>
            </div>
            <div class="max-text">/ <span id="maxHD" style="color:var(--text-main);">1</span></div>
          </div>
        </div>

        <div id="dynamicResourcesContainer"></div>
      </div>
    </div>

    <div class="hero-card ability-card">
      <div id="classMechanicPanel" class="mechanic-panel"></div>
      <div id="skillsContainer" class="skills-box"></div>
    </div>
  </div>

  <div class="layout-1col">
    <div class="conditions-box">
      <h2 class="section-header" style="font-size: 1.1em; margin-bottom: 10px; border: none;">Conditions & Status Effects</h2>
      <div class="conditions-flex" id="conditionsContainer"></div>
    </div>

    <div class="skills-box" style="padding: 15px; height: auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom: 2px solid var(--slate-lighter); padding-bottom: 5px;">
        <span style="font-family:'Cinzel', serif; font-weight:bold; color:var(--text-main); font-size:1.1em;">INVENTORY & EQUIPMENT</span>
        <div style="display:flex; align-items:center; gap: 15px;">
          <span id="inventorySlots" style="color:var(--class-accent); font-weight:bold; letter-spacing:1px; font-size: 0.9em;">SLOTS: 0 / 10</span>
          <div style="display:flex; align-items:center; border: 1px solid var(--gold-dim); background: linear-gradient(145deg, var(--slate-mid), var(--slate-dark)); border-radius: 4px; padding: 2px 8px; gap: 6px;">
              <label style="color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 0.8em; font-weight: bold; margin: 0; text-transform: uppercase;">Gold</label>
              <input type="number" id="gold" class="gold-input" value="0" min="0" style="width: 55px; font-size: 1.1em; padding: 0; border: none; border-bottom: 1px solid var(--gold-dim); background: transparent; color: #fff; font-family: 'Crimson Text', serif; font-weight: bold; text-align: center; transition: border-color 0.2s;">
          </div>
        </div>
      </div>
      
      <div id="inventoryContainer"></div>
      
      <div style="display: flex; gap: 8px; margin-top: 10px;">
        <select class="add-item-btn" id="meleeSelect" style="padding: 8px;"></select>
        <select class="add-item-btn" id="rangedSelect" style="padding: 8px;"></select>
        <select class="add-item-btn" id="armorSelect" style="padding: 8px;"></select>
        <button class="add-item-btn" onclick="addItem()" style="white-space: nowrap;">+ Custom</button>
      </div>
    </div>
  </div>

  <div class="layout-1col" id="featuresSpellsLayout">
    <div class="left-col">
      <div>
        <h2 class="section-header">Features & Traits</h2>
        <div id="featuresContainer"></div>
      </div>
    </div>
    <div class="right-col" id="spellsColWrapper" style="display: none;">
      <div id="spellsSection" style="height: 100%;">
        <h2 class="section-header" id="spellSectionTitle">Spells</h2>
        <div id="spellsContainer" class="spell-grid"></div>
      </div>
    </div>
  </div>

</div>

<!-- INJECT_SCRIPTS -->

</body>
</html>
