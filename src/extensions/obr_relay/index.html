<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIMBLE Dice+ Relay</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #ccc; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            text-align: center; 
        }
        .status { padding: 10px; border-radius: 4px; background: rgba(0,0,0,0.3); font-size: 12px; transition: all 0.3s ease; }
        .active { color: #4ade80; border: 1px solid #4ade8033; background: rgba(74, 222, 128, 0.1); }
        .waiting { color: #fbbf24; border: 1px solid #fbbf2433; }
        .title { font-weight: bold; margin-bottom: 8px; color: #fff; font-size: 14px; }
    </style>
</head>
<body>
    <div class="title">NIMBLE Bridge</div>
    <div id="status" class="status waiting">Waiting for OBR...</div>

    <script type="module" src="relay.js"></script>
</body>
</html>
