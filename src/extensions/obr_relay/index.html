<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIMBLE Dice+ Relay</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #ccc; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            text-align: center; 
        }
        .status { padding: 10px; border-radius: 4px; background: rgba(0,0,0,0.3); font-size: 12px; transition: all 0.3s ease; }
        .active { color: #4ade80; border: 1px solid #4ade8033; background: rgba(74, 222, 128, 0.1); }
        .waiting { color: #fbbf24; border: 1px solid #fbbf2433; }
        .title { font-weight: bold; margin-bottom: 8px; color: #fff; font-size: 14px; }
    </style>
</head>
<body>
    <div class="title">NIMBLE Bridge</div>
    <div id="status" class="status waiting">Waiting for OBR...</div>

    <script type="importmap">
    {
      "imports": {
        "@owlbear-rodeo/sdk": "https://esm.sh/@owlbear-rodeo/sdk"
      }
    }
    </script>

    <script type="module">
        import OBR from "@owlbear-rodeo/sdk";

        const RELAY_ID = "com.nimble.dice-plus-bridge";
        const statusEl = document.getElementById('status');
        let dicePlusReady = false;
        
        OBR.onReady(async () => {
            const name = await OBR.player.getName();
            const id = await OBR.player.getId();
            const role = await OBR.player.getRole();
            
            statusEl.textContent = `Connected as ${role}`;
            console.log(`NIMBLE Bridge: Connected as ${role} (${name}).`);

            // 1. Listen for Dice+ Readiness
            OBR.broadcast.onMessage("dice-plus/isReady", (event) => {
                const data = event.data;
                if (data.ready) {
                    dicePlusReady = true;
                    statusEl.textContent = `Dice+ Ready (${role})`;
                    statusEl.className = "status active";
                    console.log("NIMBLE Bridge: Dice+ confirmed ready.");
                }
            });

            // 2. Poke Dice+ to wake it up
            const pokeDicePlus = () => {
                OBR.broadcast.sendMessage("dice-plus/isReady", { 
                    requestId: `init_${Date.now()}`, 
                    timestamp: Date.now() 
                }, { destination: "ALL" });
            };
            
            pokeDicePlus();
            const pokeInterval = setInterval(() => {
                if (dicePlusReady) clearInterval(pokeInterval);
                else pokeDicePlus();
            }, 2000);

            // 3. Listen for Roll Results from Dice+
            // Per Dice+ API, results are broadcast to "{source}/roll-result"
            OBR.broadcast.onMessage("nimble-bridge/roll-result", (delivery) => {
                const result = delivery.data;
                console.log("NIMBLE Bridge: Roll result received from Dice+:", result);
                
                // Forward the result back to the parent OBR tab content script
                window.parent.postMessage({
                    type: "NIMBLE_ROLL_RESULT",
                    result: result
                }, "*");
            });

            let lastRollTime = 0;

            window.addEventListener("message", (event) => {
                const data = event.data;
                if (data?.type === "NIMBLE_ROLL_REQUEST") {
                    const roll = data.roll;
                    
                    // Simple robust deduplication
                    const now = Date.now();
                    if (now - lastRollTime < 500) return;
                    lastRollTime = now;

                    // If Dice+ isn't ready, poke it again right before the roll
                    if (!dicePlusReady) pokeDicePlus();

                    // Construct the Dice+ request
                    // We append the label in brackets to the notation as per Dice+ spec: [roll] [label]
                    const cleanLabel = (roll.label || "").replace(/[\[\]]/g, ""); // strip internal brackets
                    const diceNotation = cleanLabel ? `${roll.notation} [${cleanLabel}]` : roll.notation;

                    const rollRequest = {
                        rollId: crypto.randomUUID(),
                        playerId: id,
                        playerName: roll.playerName || name,
                        rollTarget: 'everyone',
                        diceNotation: diceNotation,
                        showResults: true,
                        timestamp: Date.now(),
                        source: "nimble-bridge"
                    };

                    // Force broadcast to ALL explicitly. This covers both local and remote.
                    OBR.broadcast.sendMessage("dice-plus/roll-request", rollRequest, { destination: "ALL" });
                }
            });
        });
    </script>
</body>
</html>
